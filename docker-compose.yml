# 開発用 docker-compose（tech.md コンテナ構成）。
#   - ver2-db      : ver2 DB（自前・読み書き・独立ボリューム）
#   - inspection-db: 業者検査 DB 代役（dump ロードは scripts/ で後日。ここは空の代役）
#   - backend      : ver2 バックエンド（API＋スケジューラ＋再学習。uvicorn --workers 1）
#   - pgadmin      : DB 確認用（ver2-db / inspection-db を起動時に自動登録。開発専用）
#
# 本番の業者検査 DB はコンテナ化せず、INSPECTION_DATABASE_URL で外部へ読み取り接続する。
# フロントは開発では Vite devserver（別プロセス）。本番は backend が dist/ を配信する。

services:
  ver2-db:
    image: postgres:14
    environment:
      POSTGRES_USER: shisui
      POSTGRES_PASSWORD: shisui
      POSTGRES_DB: ver2
    volumes:
      - ver2-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shisui -d ver2"]
      interval: 5s
      timeout: 5s
      retries: 10

  inspection-db:
    # 業者検査 DB（app_db）の代役。dump（PG17 製）と揃えるため postgres:17 を使用。
    image: postgres:17
    environment:
      POSTGRES_USER: readonly
      POSTGRES_PASSWORD: readonly
      POSTGRES_DB: app_db
    volumes:
      - inspection-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U readonly -d app_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://shisui:shisui@ver2-db:5432/ver2
      INSPECTION_DATABASE_URL: postgresql+psycopg2://readonly:readonly@inspection-db:5432/app_db
      ENVIRONMENT: development
      LOG_LEVEL: INFO
      ENABLE_BASIC_AUTH: "false"
      # 再学習（training/ 連携）。Dockerfile で構築した training 専用 venv を指す。
      TRAINING_DIR: /training
      TRAINING_MODEL_DIR: /training/6_model
      TRAINING_PYTHON: /training-venv/bin/python
      # config.yaml 自身は Windows 絶対パス（ローカル実行用）のため、Docker ではこちらで上書きする。
      TRAINING_IMAGENET_PATH: /imagenet/train
      # pretraining_dir/dataset_path/backup_dir/download_dir/pool_base/staging_dir/
      # monochro.raw_image_root を一括で /retrain_app_CW/<同名> に上書きする。
      TRAINING_DATA_ROOT: /retrain_app_CW
    volumes:
      # training/ はバインドマウント（config.yaml・pipline.py 等の編集を再ビルド無しで反映）。
      - ./training:/training
      # ImageNet（EfficientAD の penalty set）。イメージには焼き込まず読み取り専用で参照する。
      - D:/0032011/ILSVRC/Data/CLS-LOC/train:/imagenet/train:ro
      # 既存の学習データ（1_download 等）一式。書き込みも発生するため rw。
      - D:/0032011/GitLab/shisui/retrain_app_CW:/retrain_app_CW
    ports:
      - "8000:8000"
    depends_on:
      ver2-db:
        condition: service_healthy
      inspection-db:
        condition: service_healthy
    # GPU（開発機: RTX A5000 ×2・cu121）。本番 Blackwell 移行時も device 指定は変更不要。
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    volumes:
      - pgadmin-data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
    ports:
      - "5050:80"
    depends_on:
      ver2-db:
        condition: service_healthy
      inspection-db:
        condition: service_healthy

volumes:
  ver2-db-data:
  inspection-db-data:
  pgadmin-data:
