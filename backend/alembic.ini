# Alembic config (ver2 DB only; the external inspection DB is out of scope).
# The connection URL is set by env.py from the DATABASE_URL environment variable
# (no secrets are stored here). Comments are ASCII-only so configparser can read
# this file with the platform default encoding (e.g. cp932 on Windows).

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# Plain logging.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)s %(name)s: %(message)s
